[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/webhook/trello"
  to = "/.netlify/functions/webhook/webhook/trello"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/webhook/:splat"
  status = 200
